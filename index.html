input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; background: #333355; border-radius: 2px; outline: none; width: 100%; cursor: pointer; }

.btn:hover { background: #3a3a5a; color: #fff; }
.btn.active { background: #4455cc; border-color: #5566dd; color: #fff; }
.layer-item { border-bottom: 1px solid #2a2a4a; cursor: pointer; padding: 4px 6px; display: flex; align-items: center; gap: 4px; }
.layer-item:hover { background: #2a2a4a; }
.layer-item.active { background: #333366; border-left: 3px solid #6677ff; }
.menu-bar-item { padding: 4px 10px; cursor: pointer; color: #bbb; font-size: 12px; border-radius: 2px; position: relative; }
.menu-bar-item:hover { background: #3a3a5a; color: #fff; }
.dropdown-menu { position: absolute; top: 100%; left: 0; background: #252550; border: 1px solid #444466; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); min-width: 200px; z-index: 1000; padding: 4px 0; }

.dropdown-item:hover { background: #4455cc; color: #fff; }
.dropdown-separator { height: 1px; background: #333366; margin: 4px 0; }
.tab-btn { flex: 1; padding: 6px 0; text-align: center; font-size: 10px; cursor: pointer; text-transform: capitalize; color: #666; border-bottom: 2px solid transparent; }
.tab-btn:hover { color: #aaa; }
.tab-btn.active { background: #2a2a4a; color: #fff; border-bottom-color: #6677ff; }
#loading-msg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #8899ff; font-size: 18px; z-index: 99999; flex-direction: column; gap: 12px; }
#loading-msg .spinner { width: 40px; height: 40px; border: 3px solid #333366; border-top-color: #6677ff; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.color-swatch { width: 20px; height: 20px; border-radius: 3px; cursor: pointer; border: 1px solid #444466; }
.color-swatch:hover { border-color: #fff; }

// ============ UTILITY FUNCTIONS ============
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return { r: r, g: g, b: b };
}
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(function(x) { return Math.round(x).toString(16).padStart(2,'0'); }).join('');
}
function hsvToRgb(h, s, v) {
  h = h / 360; s = s / 100; v = v / 100;
  var r, g, b;
  var i = Math.floor(h * 6);
  var f = h * 6 - i;
  var p = v * (1 - s);
  var q = v * (1 - f * s);
  var t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
}
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var d = max - min;
  var h, s = max === 0 ? 0 : d / max, v = max;
  if (max === min) { h = 0; }
  else {
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
}
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1)); }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function getCompositeOp(mode) {
  var map = {
    'Normal': 'source-over', 'Multiply': 'multiply', 'Screen': 'screen',
    'Overlay': 'overlay', 'Soft Light': 'soft-light', 'Hard Light': 'hard-light',
    'Color Dodge': 'color-dodge', 'Color Burn': 'color-burn', 'Difference': 'difference',
    'Hue': 'hue', 'Saturation': 'saturation', 'Color': 'color', 'Luminosity': 'luminosity',
  };
  return map[mode] || 'source-over';
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'style' && typeof attrs[k] === 'object') {
        Object.assign(e.style, attrs[k]);
      } else if (k.startsWith('on')) {
        e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === 'className') {
        e.className = attrs[k];
      } else if (k === 'innerHTML') {
        e.innerHTML = attrs[k];
      } else {
        e.setAttribute(k, attrs[k]);
      }
    });
  }
  if (children) {
    if (typeof children === 'string') { e.textContent = children; }
    else if (Array.isArray(children)) { children.forEach(function(c) { if (c) e.appendChild(c); }); }
    else { e.appendChild(children); }
  }
  return e;
}

// ============ LAYER MANAGEMENT ============
function createLayerCanvas(w, h, fill) {
  var c = document.createElement('canvas');
  c.width = w || state.canvasWidth;
  c.height = h || state.canvasHeight;
  if (fill) {
    var ctx = c.getContext('2d');
    ctx.fillStyle = fill;
    ctx.fillRect(0, 0, c.width, c.height);
  }
  return c;
}

function initLayers() {
  state.layers = [
    { id: 1, name: 'Background', visible: true, locked: false, opacity: 100, blendMode: 'Normal', canvas: createLayerCanvas(state.canvasWidth, state.canvasHeight, '#ffffff') },
    { id: 2, name: 'Layer 1', visible: true, locked: false, opacity: 100, blendMode: 'Normal', canvas: createLayerCanvas(state.canvasWidth, state.canvasHeight, null) },
  ];
  state.activeLayerId = 2;
  state.nextLayerId = 3;
  state.history = [];
  state.historyIndex = -1;
  state.historyLabels = [];
  saveHistory('New Canvas');
}

function getActiveLayer() {
  return state.layers.find(function(l) { return l.id === state.activeLayerId; });
}

function addLayer() {
  var c = createLayerCanvas(state.canvasWidth, state.canvasHeight, null);
  var newLayer = { id: state.nextLayerId, name: 'Layer ' + (state.nextLayerId - 1), visible: true, locked: false, opacity: 100, blendMode: 'Normal', canvas: c };
  state.layers.push(newLayer);
  state.activeLayerId = state.nextLayerId;
  state.nextLayerId++;
  saveHistory('New Layer');
  compositeAll();
  refreshUI();
}

function deleteLayer() {
  if (state.layers.length <= 1) return;
  state.layers = state.layers.filter(function(l) { return l.id !== state.activeLayerId; });
  state.activeLayerId = state.layers[state.layers.length - 1].id;
  saveHistory('Delete Layer');
  compositeAll();
  refreshUI();
}

function duplicateLayer() {
  var source = getActiveLayer();
  if (!source) return;
  var c = createLayerCanvas(state.canvasWidth, state.canvasHeight, null);
  if (source.canvas) c.getContext('2d').drawImage(source.canvas, 0, 0);
  var idx = state.layers.findIndex(function(l) { return l.id === state.activeLayerId; });
  var newLayer = { id: state.nextLayerId, name: source.name + ' Copy', visible: true, locked: false, opacity: source.opacity, blendMode: source.blendMode, canvas: c };
  state.layers.splice(idx + 1, 0, newLayer);
  state.activeLayerId = state.nextLayerId;
  state.nextLayerId++;
  saveHistory('Duplicate Layer');
  compositeAll();
  refreshUI();
}

function mergeDown() {
  var idx = state.layers.findIndex(function(l) { return l.id === state.activeLayerId; });
  if (idx <= 0) return;
  var upper = state.layers[idx];
  var lower = state.layers[idx - 1];
  if (!upper.canvas || !lower.canvas) return;
  var ctx = lower.canvas.getContext('2d');
  ctx.globalAlpha = upper.opacity / 100;
  ctx.globalCompositeOperation = getCompositeOp(upper.blendMode);
  ctx.drawImage(upper.canvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  state.layers.splice(idx, 1);
  state.activeLayerId = lower.id;
  saveHistory('Merge Down');
  compositeAll();
  refreshUI();
}

function flattenImage() {
  var c = createLayerCanvas(state.canvasWidth, state.canvasHeight, '#ffffff');
  var ctx = c.getContext('2d');
  state.layers.forEach(function(layer) {
    if (!layer.visible || !layer.canvas) return;
    ctx.globalAlpha = layer.opacity / 100;
    ctx.globalCompositeOperation = getCompositeOp(layer.blendMode);
    ctx.drawImage(layer.canvas, 0, 0);
  });
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  state.layers = [{ id: 1, name: 'Background', visible: true, locked: false, opacity: 100, blendMode: 'Normal', canvas: c }];
  state.activeLayerId = 1;
  state.nextLayerId = 2;
  saveHistory('Flatten');
  compositeAll();
  refreshUI();
}

function moveLayerOrder(fromIdx, direction) {
  var toIdx = fromIdx + direction;
  if (toIdx < 0 || toIdx >= state.layers.length) return;
  var temp = state.layers[fromIdx];
  state.layers[fromIdx] = state.layers[toIdx];
  state.layers[toIdx] = temp;
  compositeAll();
  refreshUI();
}

// ============ HISTORY ============
function saveHistory(label) {
  var snapshot = state.layers.map(function(l) {
    var c = document.createElement('canvas');
    c.width = state.canvasWidth;
    c.height = state.canvasHeight;
    if (l.canvas) c.getContext('2d').drawImage(l.canvas, 0, 0);
    return { id: l.id, name: l.name, visible: l.visible, locked: l.locked, opacity: l.opacity, blendMode: l.blendMode, canvas: c };
  });
  state.history = state.history.slice(0, state.historyIndex + 1);
  state.historyLabels = state.historyLabels.slice(0, state.historyIndex + 1);
  state.history.push(snapshot);
  state.historyLabels.push(label);
  if (state.history.length > 80) { state.history.shift(); state.historyLabels.shift(); }
  state.historyIndex = state.history.length - 1;
}

function undo() {
  if (state.historyIndex <= 0) return;
  state.historyIndex--;
  restoreFromHistory(state.historyIndex);
}

function redo() {
  if (state.historyIndex >= state.history.length - 1) return;
  state.historyIndex++;
  restoreFromHistory(state.historyIndex);
}

function restoreFromHistory(index) {
  var snapshot = state.history[index];
  if (!snapshot) return;
  state.layers = snapshot.map(function(l) {
    var c = document.createElement('canvas');
    c.width = state.canvasWidth;
    c.height = state.canvasHeight;
    if (l.canvas) c.getContext('2d').drawImage(l.canvas, 0, 0);
    return { id: l.id, name: l.name, visible: l.visible, locked: l.locked, opacity: l.opacity, blendMode: l.blendMode, canvas: c };
  });
  compositeAll();
  refreshUI();
}

// ============ COMPOSITING ============
function compositeAll() {
  if (!compositeCanvas) return;
  compositeCanvas.width = state.canvasWidth;
  compositeCanvas.height = state.canvasHeight;
  compositeCtx = compositeCanvas.getContext('2d');
  compositeCtx.clearRect(0, 0, state.canvasWidth, state.canvasHeight);
  state.layers.forEach(function(layer) {
    if (!layer.visible || !layer.canvas) return;
    compositeCtx.globalAlpha = layer.opacity / 100;
    compositeCtx.globalCompositeOperation = getCompositeOp(layer.blendMode);
    compositeCtx.drawImage(layer.canvas, 0, 0);
  });
  compositeCtx.globalAlpha = 1;
  compositeCtx.globalCompositeOperation = 'source-over';
  renderToMain();
}

function renderToMain() {
  if (!mainCanvas || !compositeCanvas) return;
  mainCtx = mainCanvas.getContext('2d');
  var w = mainCanvas.width;
  var h = mainCanvas.height;
  mainCtx.clearRect(0, 0, w, h);
  mainCtx.save();
  mainCtx.translate(w/2 + state.panX, h/2 + state.panY);
  mainCtx.rotate(state.rotation * Math.PI / 180);
  mainCtx.scale(state.zoom, state.zoom);
  mainCtx.translate(-state.canvasWidth/2, -state.canvasHeight/2);
  // Checkerboard
  var tileSize = 16;
  for (var y = 0; y < state.canvasHeight; y += tileSize) {
    for (var x = 0; x < state.canvasWidth; x += tileSize) {
      mainCtx.fillStyle = ((x/tileSize + y/tileSize) % 2 === 0) ? '#cccccc' : '#ffffff';
      mainCtx.fillRect(x, y, tileSize, tileSize);
    }
  }
  mainCtx.drawImage(compositeCanvas, 0, 0);
  mainCtx.restore();
}

function resizeMainCanvas() {
  if (!mainCanvas || !containerEl) return;
  mainCanvas.width = containerEl.clientWidth;
  mainCanvas.height = containerEl.clientHeight;
  compositeAll();
}

// ============ COORDINATE TRANSFORM ============
function screenToCanvas(clientX, clientY) {
  if (!mainCanvas) return { x: 0, y: 0 };
  var rect = mainCanvas.getBoundingClientRect();
  var sx = clientX - rect.left;
  var sy = clientY - rect.top;
  var cx = mainCanvas.width / 2 + state.panX;
  var cy = mainCanvas.height / 2 + state.panY;
  var dx = sx - cx;
  var dy = sy - cy;
  var angle = -state.rotation * Math.PI / 180;
  var rx = dx * Math.cos(angle) - dy * Math.sin(angle);
  var ry = dx * Math.sin(angle) + dy * Math.cos(angle);
  return {
    x: rx / state.zoom + state.canvasWidth / 2,
    y: ry / state.zoom + state.canvasHeight / 2,
  };
}

// ============ BRUSH RENDERING ============
function drawBrushDab(ctx, x, y, pressure, color, isEraser) {
  var size = state.brushSize * pressure;
  var opacity = (state.brushOpacity / 100) * (state.brushFlow / 100) * pressure;
  var hardness = state.brushHardness / 100;
  ctx.save();
  if (isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
  } else {
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.globalAlpha = opacity;

  switch(state.brushType) {
    case 'pencil': {
      var noise = Math.random() * 0.3 + 0.7;
      ctx.globalAlpha = opacity * noise * 0.7;
      ctx.beginPath();
      ctx.arc(x, y, size/2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      break;
    }
    case 'ink': {
      ctx.beginPath();
      ctx.arc(x, y, size/2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      break;
    }
    case 'airbrush': {
      var gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.5, color.slice(0,7) + '44');
      gradient.addColorStop(1, color.slice(0,7) + '00');
      ctx.globalAlpha = opacity * 0.3;
      ctx.fillStyle = gradient;
      ctx.fillRect(x - size, y - size, size * 2, size * 2);
      break;
    }
    case 'watercolor': {
      var wcGrad = ctx.createRadialGradient(x, y, 0, x, y, size * (1 + Math.random() * 0.3));
      wcGrad.addColorStop(0, color);
      wcGrad.addColorStop(0.6, color.slice(0,7) + '66');
      wcGrad.addColorStop(1, color.slice(0,7) + '00');
      ctx.globalAlpha = opacity * 0.4;
      ctx.fillStyle = wcGrad;
      ctx.beginPath();
      ctx.ellipse(x, y, size * (0.9 + Math.random()*0.2), size * (0.9 + Math.random()*0.2), Math.random() * Math.PI, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case 'marker': {
      ctx.globalAlpha = opacity * 0.6;
      ctx.beginPath();
      ctx.arc(x, y, size/2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      break;
    }
    case 'charcoal': {
      ctx.globalAlpha = opacity * 0.5;
      var cSize = size / 2;
      for (var i = 0; i < 3; i++) {
        var ox = (Math.random() - 0.5) * cSize * 0.5;
        var oy = (Math.random() - 0.5) * cSize * 0.5;
        ctx.beginPath();
        ctx.ellipse(x + ox, y + oy, cSize * (0.5 + Math.random()*0.5), cSize * (0.3 + Math.random()*0.3), Math.random()*Math.PI, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
      }
      break;
    }
    default: { // round
      if (hardness >= 0.95) {
        ctx.beginPath();
        ctx.arc(x, y, size/2, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      } else {
        var grad = ctx.createRadialGradient(x, y, size/2 * hardness, x, y, size/2);
        grad.addColorStop(0, color);
        grad.addColorStop(1, color.slice(0,7) + '00');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, size/2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawStrokeLine(ctx, from, to, pressure, color, isEraser) {
  var d = dist(from.x, from.y, to.x, to.y);
  var spacing = Math.max(1, state.brushSize * (state.brushSpacing / 100) * 0.5);
  var steps = Math.max(1, Math.ceil(d / spacing));
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var px = lerp(from.x, to.x, t);
    var py = lerp(from.y, to.y, t);
    var p = lerp(from.pressure || pressure, to.pressure || pressure, t);
    drawBrushDab(ctx, px, py, p, color, isEraser);
  }
}

// ============ FLOOD FILL ============
function floodFill(startX, startY) {
  var activeLayer = getActiveLayer();
  if (!activeLayer || !activeLayer.canvas || activeLayer.locked) return;
  var ctx = activeLayer.canvas.getContext('2d');
  var imageData = ctx.getImageData(0, 0, state.canvasWidth, state.canvasHeight);
  var data = imageData.data;
  var idx = (startY * state.canvasWidth + startX) * 4;
  var targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
  var fill = hexToRgb(state.foregroundColor);
  if (targetR === fill.r && targetG === fill.g && targetB === fill.b) return;
  var stack = [[startX, startY]];
  var visited = new Uint8Array(state.canvasWidth * state.canvasHeight);
  var tolerance = 30;
  while (stack.length > 0) {
    var pt = stack.pop();
    var x = pt[0], y = pt[1];
    if (x < 0 || x >= state.canvasWidth || y < 0 || y >= state.canvasHeight) continue;
    var key = y * state.canvasWidth + x;
    if (visited[key]) continue;
    visited[key] = 1;
    var ci = key * 4;
    var dr = Math.abs(data[ci] - targetR);
    var dg = Math.abs(data[ci+1] - targetG);
    var db = Math.abs(data[ci+2] - targetB);
    if (dr + dg + db > tolerance) continue;
    data[ci] = fill.r;
    data[ci+1] = fill.g;
    data[ci+2] = fill.b;
    data[ci+3] = 255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData, 0, 0);
  compositeAll();
  saveHistory('Fill');
  refreshUI();
}

// ============ COLOR PICKING ============
function pickColor(x, y) {
  if (!compositeCanvas) return;
  var ctx = compositeCanvas.getContext('2d');
  var pixel = ctx.getImageData(Math.round(clamp(x, 0, state.canvasWidth-1)), Math.round(clamp(y, 0, state.canvasHeight-1)), 1, 1).data;
  var hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
  state.foregroundColor = hex;
  var hsv = rgbToHsv(pixel[0], pixel[1], pixel[2]);
  state.hue = hsv.h; state.sat = hsv.s; state.val = hsv.v;
  addRecentColor(hex);
  refreshUI();
}

function addRecentColor(color) {
  state.recentColors = state.recentColors.filter(function(c) { return c !== color; });
  state.recentColors.unshift(color);
  if (state.recentColors.length > 16) state.recentColors.length = 16;
}

function setColorFromHex(hex) {
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  state.foregroundColor = hex;
  var rgb = hexToRgb(hex);
  var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
  state.hue = hsv.h; state.sat = hsv.s; state.val = hsv.v;
  refreshUI();
}

function updateColorFromHSV() {
  var rgb = hsvToRgb(state.hue, state.sat, state.val);
  state.foregroundColor = rgbToHex(rgb.r, rgb.g, rgb.b);
}

// ============ POINTER EVENT HANDLERS ============
function handlePointerDown(e) {
  if (e.button === 1 || (e.button === 0 && state.spaceHeld)) {
    state.isPanning = true;
    state.panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
    e.preventDefault();
    return;
  }
  if (e.button === 2 || e.button !== 0) return;

  var pos = screenToCanvas(e.clientX, e.clientY);
  var pressure = e.pressure > 0 ? e.pressure : 0.5;

  if (state.currentTool === 'eyedropper') {
    pickColor(pos.x, pos.y);
    return;
  }
  if (state.currentTool === 'bucket') {
    floodFill(Math.round(clamp(pos.x, 0, state.canvasWidth-1)), Math.round(clamp(pos.y, 0, state.canvasHeight-1)));
    return;
  }
  if (state.currentTool === 'move') {
    state.isDrawing = true;
    state.lastPoint = { x: e.clientX, y: e.clientY };
    mainCanvas.setPointerCapture(e.pointerId);
    return;
  }

  var activeLayer = getActiveLayer();
  if (!activeLayer || activeLayer.locked || !activeLayer.visible) return;

  state.isDrawing = true;
  state.points = [{ x: pos.x, y: pos.y, pressure: pressure }];
  state.lastPoint = { x: pos.x, y: pos.y, pressure: pressure };

  // Draw first dab directly on the layer
  var ctx = activeLayer.canvas.getContext('2d');
  var isEraser = state.currentTool === 'eraser';
  var color = isEraser ? '#000000' : state.foregroundColor;
  drawBrushDab(ctx, pos.x, pos.y, pressure, color, isEraser);
  compositeAll();
  mainCanvas.setPointerCapture(e.pointerId);
}

function handlePointerMove(e) {
  var pos = screenToCanvas(e.clientX, e.clientY);
  state.cursorPos = { x: Math.round(pos.x), y: Math.round(pos.y) };
  updateStatusBar();

  if (state.isPanning) {
    state.panX = e.clientX - state.panStart.x;
    state.panY = e.clientY - state.panStart.y;
    compositeAll();
    return;
  }

  if (state.currentTool === 'move' && state.isDrawing && state.lastPoint) {
    var dx = (e.clientX - state.lastPoint.x) / state.zoom;
    var dy = (e.clientY - state.lastPoint.y) / state.zoom;
    var activeLayer = getActiveLayer();
    if (activeLayer && activeLayer.canvas) {
      var ctx = activeLayer.canvas.getContext('2d');
      var imgData = ctx.getImageData(0, 0, state.canvasWidth, state.canvasHeight);
      ctx.clearRect(0, 0, state.canvasWidth, state.canvasHeight);
      ctx.putImageData(imgData, Math.round(dx), Math.round(dy));
      compositeAll();
    }
    state.lastPoint = { x: e.clientX, y: e.clientY };
    return;
  }

  if (!state.isDrawing) return;
  var pressure = e.pressure > 0 ? e.pressure : 0.5;
  var current = { x: pos.x, y: pos.y, pressure: pressure };
  state.points.push(current);

  var activeLayer = getActiveLayer();
  if (!activeLayer || !activeLayer.canvas) return;
  var ctx = activeLayer.canvas.getContext('2d');
  var isEraser = state.currentTool === 'eraser';
  var color = isEraser ? '#000000' : state.foregroundColor;

  var pts = state.points;
  if (pts.length >= 2) {
    var from = pts[pts.length - 2];
    var to = pts[pts.length - 1];
    drawStrokeLine(ctx, from, to, pressure, color, isEraser);
  }
  state.lastPoint = current;
  compositeAll();
}

function handlePointerUp(e) {
  if (state.isPanning) {
    state.isPanning = false;
    return;
  }
  if (state.currentTool === 'move' && state.isDrawing) {
    state.isDrawing = false;
    saveHistory('Move Layer');
    return;
  }
  if (!state.isDrawing) return;
  state.isDrawing = false;
  state.points = [];
  state.lastPoint = null;
  saveHistory(state.currentTool === 'eraser' ? 'Erase' : 'Paint');
  addRecentColor(state.foregroundColor);
}

function handleWheel(e) {
  e.preventDefault();
  if (e.ctrlKey) {
    state.rotation += (e.deltaY > 0 ? 5 : -5);
  } else {
    var factor = e.deltaY > 0 ? 0.9 : 1.1;
    state.zoom = clamp(state.zoom * factor, 0.05, 32);
  }
  compositeAll();
  updateStatusBar();
}

// ============ FILE OPERATIONS ============
function exportPNG() {
  if (!compositeCanvas) return;
  var link = document.createElement('a');
  link.download = 'painting.png';
  link.href = compositeCanvas.toDataURL('image/png');
  link.click();
}

function exportJPG() {
  var c = createLayerCanvas(state.canvasWidth, state.canvasHeight, '#ffffff');
  var ctx = c.getContext('2d');
  if (compositeCanvas) ctx.drawImage(compositeCanvas, 0, 0);
  var link = document.createElement('a');
  link.download = 'painting.jpg';
  link.href = c.toDataURL('image/jpeg', 0.92);
  link.click();
}

function importImage() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var c = createLayerCanvas(state.canvasWidth, state.canvasHeight, null);
        var ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, state.canvasWidth, state.canvasHeight);
        var newLayer = { id: state.nextLayerId, name: file.name, visible: true, locked: false, opacity: 100, blendMode: 'Normal', canvas: c };
        state.layers.push(newLayer);
        state.activeLayerId = state.nextLayerId;
        state.nextLayerId++;
        saveHistory('Import Image');
        compositeAll();
        refreshUI();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function newCanvas(w, h) {
  state.canvasWidth = w;
  state.canvasHeight = h;
  initLayers();
  state.zoom = 1;
  state.panX = 0;
  state.panY = 0;
  state.rotation = 0;
  compositeAll();
  refreshUI();
  closeDialogs();
}

// ============ FILTERS ============
function applyFilter(type) {
  var activeLayer = getActiveLayer();
  if (!activeLayer || !activeLayer.canvas || activeLayer.locked) return;
  var ctx = activeLayer.canvas.getContext('2d');
  if (type === 'blur') {
    ctx.filter = 'blur(3px)';
    ctx.drawImage(activeLayer.canvas, 0, 0);
    ctx.filter = 'none';
    compositeAll();
    saveHistory('Blur');
    return;
  }
  var imageData = ctx.getImageData(0, 0, state.canvasWidth, state.canvasHeight);
  var data = imageData.data;
  switch(type) {
    case 'grayscale':
      for (var i = 0; i < data.length; i += 4) {
        var avg = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        data[i] = data[i+1] = data[i+2] = avg;
      }
      break;
    case 'invert':
      for (var i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i+1] = 255 - data[i+1];
        data[i+2] = 255 - data[i+2];
      }
      break;
    case 'brighten':
      for (var i = 0; i < data.length; i += 4) {
        data[i] = Math.min(255, data[i] * 1.1);
        data[i+1] = Math.min(255, data[i+1] * 1.1);
        data[i+2] = Math.min(255, data[i+2] * 1.1);
      }
      break;
    case 'contrast':
      for (var i = 0; i < data.length; i += 4) {
        data[i] = clamp((data[i] - 128) * 1.2 + 128, 0, 255);
        data[i+1] = clamp((data[i+1] - 128) * 1.2 + 128, 0, 255);
        data[i+2] = clamp((data[i+2] - 128) * 1.2 + 128, 0, 255);
      }
      break;
  }
  ctx.putImageData(imageData, 0, 0);
  compositeAll();
  saveHistory(type.charAt(0).toUpperCase() + type.slice(1));
}

// ============ KEYBOARD SHORTCUTS ============
function handleKeyDown(e) {
  if (state.showNewDialog || state.showShortcuts) {
    if (e.key === 'Escape') { closeDialogs(); }
    return;
  }
  if (e.key === ' ') { state.spaceHeld = true; e.preventDefault(); return; }
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { undo(); e.preventDefault(); return; }
  if (e.ctrlKey && e.shiftKey && (e.key === 'Z' || e.key === 'z')) { redo(); e.preventDefault(); return; }
  if (e.ctrlKey && e.key === 'n') { state.showNewDialog = true; refreshUI(); e.preventDefault(); return; }
  if (e.ctrlKey && e.key === 's') { exportPNG(); e.preventDefault(); return; }
  if (!e.ctrlKey && !e.altKey) {
    switch(e.key.toLowerCase()) {
      case 'b': state.currentTool = 'brush'; state.brushType = 'round'; refreshUI(); break;
      case 'n': state.currentTool = 'pencil'; state.brushType = 'pencil'; refreshUI(); break;
      case 'e': state.currentTool = 'eraser'; refreshUI(); break;
      case 'v': state.currentTool = 'move'; refreshUI(); break;
      case 'g': state.currentTool = 'bucket'; refreshUI(); break;
      case 'i': state.currentTool = 'eyedropper'; refreshUI(); break;
      case 'x':
        var tmp = state.foregroundColor;
        state.foregroundColor = state.backgroundColor;
        state.backgroundColor = tmp;
        var rgb = hexToRgb(state.foregroundColor);
        var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
        state.hue = hsv.h; state.sat = hsv.s; state.val = hsv.v;
        refreshUI();
        break;
      case 'd':
        state.foregroundColor = '#000000';
        state.backgroundColor = '#ffffff';
        state.hue = 0; state.sat = 0; state.val = 0;
        refreshUI();
        break;
      case '[': state.brushSize = Math.max(1, state.brushSize - 5); refreshUI(); break;
      case ']': state.brushSize = Math.min(500, state.brushSize + 5); refreshUI(); break;
      case '+': case '=': state.zoom = Math.min(32, state.zoom * 1.2); compositeAll(); updateStatusBar(); break;
      case '-': state.zoom = Math.max(0.1, state.zoom / 1.2); compositeAll(); updateStatusBar(); break;
      case '0': state.zoom = 1; state.panX = 0; state.panY = 0; state.rotation = 0; compositeAll(); updateStatusBar(); break;
    }
  }
}

function handleKeyUp(e) {
  if (e.key === ' ') state.spaceHeld = false;
}

function closeDialogs() {
  state.showNewDialog = false;
  state.showShortcuts = false;
  state.activeMenu = null;
  refreshUI();
}

// ============ APPLY BRUSH PRESET ============
function applyPreset(preset) {
  state.brushSize = preset.size;
  state.brushOpacity = preset.opacity;
  state.brushHardness = preset.hardness;
  state.brushFlow = preset.flow;
  state.brushSpacing = preset.spacing;
  state.brushType = preset.type;
  refreshUI();
}

// ============ UI BUILDING ============
var statusBarEl;

function updateStatusBar() {
  if (!statusBarEl) return;
  var toolName = '';
  for (var i = 0; i < TOOLS.length; i++) {
    if (TOOLS[i].id === state.currentTool) { toolName = TOOLS[i].name; break; }
  }
  statusBarEl.innerHTML = '';
  var items = [
    'Tool: ' + (toolName || state.currentTool),
    'Size: ' + state.brushSize + 'px',
    'Zoom: ' + Math.round(state.zoom * 100) + '%',
    'Canvas: ' + state.canvasWidth + 'x' + state.canvasHeight,
    'Pos: ' + state.cursorPos.x + ', ' + state.cursorPos.y,
    'Layers: ' + state.layers.length,
  ];
  items.forEach(function(txt) {
    var sp = document.createElement('span');
    sp.textContent = txt;
    sp.style.marginRight = '16px';
    statusBarEl.appendChild(sp);
  });
}

function refreshUI() {
  buildRightPanel();
  buildToolbar();
  buildMenuBar();
  updateStatusBar();
  buildDialogs();
}

var toolbarEl, rightPanelEl, menuBarEl, dialogContainerEl;

function buildApp() {
  var appEl = document.getElementById('app');
  appEl.innerHTML = '';
  appEl.style.display = 'flex';
  appEl.style.flexDirection = 'column';
  appEl.style.width = '100%';
  appEl.style.height = '100%';
  appEl.style.userSelect = 'none';

  // Menu bar
  menuBarEl = el('div', { style: { display: 'flex', alignItems: 'center', height: '28px', background: '#1a1a35', borderBottom: '1px solid #333366', padding: '0 8px', flexShrink: '0' } });
  appEl.appendChild(menuBarEl);

  // Main body row
  var bodyRow = el('div', { style: { display: 'flex', flex: '1', overflow: 'hidden' } });
  appEl.appendChild(bodyRow);

  // Left toolbar
  toolbarEl = el('div', { style: { width: '42px', background: '#1e1e3a', borderRight: '1px solid #333366', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '4px 0', gap: '2px', flexShrink: '0', overflowY: 'auto' } });
  bodyRow.appendChild(toolbarEl);

  // Canvas container
  containerEl = el('div', { style: { flex: '1', position: 'relative', overflow: 'hidden', background: '#111128' } });
  bodyRow.appendChild(containerEl);

  mainCanvas = document.createElement('canvas');
  mainCanvas.style.position = 'absolute';
  mainCanvas.style.inset = '0';
  mainCanvas.style.width = '100%';
  mainCanvas.style.height = '100%';
  mainCanvas.style.cursor = 'crosshair';
  containerEl.appendChild(mainCanvas);

  compositeCanvas = document.createElement('canvas');
  compositeCanvas.style.display = 'none';

  // Right panel
  rightPanelEl = el('div', { style: { width: '260px', background: '#1e1e3a', borderLeft: '1px solid #333366', display: 'flex', flexDirection: 'column', flexShrink: '0', overflow: 'hidden' } });
  bodyRow.appendChild(rightPanelEl);

  // Status bar
  statusBarEl = el('div', { style: { height: '24px', background: '#1a1a35', borderTop: '1px solid #333366', display: 'flex', alignItems: 'center', padding: '0 12px', fontSize: '10px', color: '#666', flexShrink: '0' } });
  appEl.appendChild(statusBarEl);

  // Dialog container
  dialogContainerEl = el('div', { style: { position: 'fixed', inset: '0', zIndex: '9999', display: 'none' } });
  appEl.appendChild(dialogContainerEl);

  // Events
  mainCanvas.addEventListener('pointerdown', handlePointerDown);
  mainCanvas.addEventListener('pointermove', handlePointerMove);
  mainCanvas.addEventListener('pointerup', handlePointerUp);
  mainCanvas.addEventListener('pointerleave', handlePointerUp);
  mainCanvas.addEventListener('wheel', handleWheel, { passive: false });
  mainCanvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  window.addEventListener('resize', resizeMainCanvas);

  // Click anywhere to close menus
  document.addEventListener('click', function(e) {
    if (state.activeMenu && !e.target.closest('.menu-bar-item') && !e.target.closest('.dropdown-menu')) {
      state.activeMenu = null;
      buildMenuBar();
    }
  });

  // Initialize
  initLayers();
  resizeMainCanvas();
  refreshUI();
}

// ============ BUILD TOOLBAR ============
function buildToolbar() {
  if (!toolbarEl) return;
  toolbarEl.innerHTML = '';
  TOOLS.forEach(function(tool) {
    var btn = el('button', {
      className: 'btn' + (state.currentTool === tool.id ? ' active' : ''),
      title: tool.name + ' (' + tool.shortcut + ')',
      style: { width: '34px', height: '34px', padding: '4px' },
      onClick: function() { state.currentTool = tool.id; if (tool.id === 'pencil') state.brushType = 'pencil'; refreshUI(); }
    });
    btn.appendChild(svgIcon(tool.icon));
    toolbarEl.appendChild(btn);
  });

  // Color swatches
  var sep = el('div', { style: { marginTop: '8px', borderTop: '1px solid #333366', paddingTop: '8px', width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' } });
  var colorContainer = el('div', { style: { position: 'relative', width: '30px', height: '30px' } });
  var fgSwatch = el('div', { style: { position: 'absolute', top: '0', left: '0', width: '22px', height: '22px', borderRadius: '3px', border: '2px solid #666', backgroundColor: state.foregroundColor, cursor: 'pointer' }, onClick: function() { state.rightPanel = 'color'; refreshUI(); } });
  var bgSwatch = el('div', { style: { position: 'absolute', bottom: '0', right: '0', width: '22px', height: '22px', borderRadius: '3px', border: '2px solid #666', backgroundColor: state.backgroundColor, cursor: 'pointer' }, onClick: function() {
    var tmp = state.foregroundColor; state.foregroundColor = state.backgroundColor; state.backgroundColor = tmp;
    var rgb = hexToRgb(state.foregroundColor); var hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
    state.hue = hsv.h; state.sat = hsv.s; state.val = hsv.v; refreshUI();
  } });
  colorContainer.appendChild(fgSwatch);
  colorContainer.appendChild(bgSwatch);
  sep.appendChild(colorContainer);
  toolbarEl.appendChild(sep);
}

// ============ BUILD MENU BAR ============
function buildMenuBar() {
  if (!menuBarEl) return;
  menuBarEl.innerHTML = '';
  var logo = el('span', { style: { fontSize: '13px', fontWeight: 'bold', color: '#8899ff', marginRight: '16px' } }, 'Infinite Painter Studio');
  menuBarEl.appendChild(logo);

  var menus = {
    File: [
      { label: 'New...', shortcut: 'Ctrl+N', action: function() { state.showNewDialog = true; refreshUI(); } },
      { label: 'Import Image...', action: importImage },
      { separator: true },
      { label: 'Export as PNG', shortcut: 'Ctrl+S', action: exportPNG },
      { label: 'Export as JPG', action: exportJPG },
    ],
    Edit: [
      { label: 'Undo', shortcut: 'Ctrl+Z', action: undo },
      { label: 'Redo', shortcut: 'Ctrl+Shift+Z', action: redo },
    ],
    View: [
      { label: 'Zoom In', shortcut: '+', action: function() { state.zoom = Math.min(32, state.zoom * 1.5); compositeAll(); updateStatusBar(); } },
      { label: 'Zoom Out', shortcut: '-', action: function() { state.zoom = Math.max(0.05, state.zoom / 1.5); compositeAll(); updateStatusBar(); } },
      { label: 'Fit to Window', shortcut: '0', action: function() { state.zoom = 1; state.panX = 0; state.panY = 0; state.rotation = 0; compositeAll(); updateStatusBar(); } },
      { separator: true },
      { label: 'Reset Rotation', action: function() { state.rotation = 0; compositeAll(); } },
    ],
    Layer: [
      { label: 'New Layer', action: addLayer },
      { label: 'Duplicate Layer', action: duplicateLayer },
      { label: 'Delete Layer', action: deleteLayer },
      { separator: true },
      { label: 'Merge Down', action: mergeDown },
      { label: 'Flatten Image', action: flattenImage },
    ],
    Filter: [
      { label: 'Blur (Gaussian)', action: function() { applyFilter('blur'); } },
      { label: 'Grayscale', action: function() { applyFilter('grayscale'); } },
      { label: 'Invert Colors', action: function() { applyFilter('invert'); } },
      { label: 'Brightness +10%', action: function() { applyFilter('brighten'); } },
      { label: 'Contrast +10%', action: function() { applyFilter('contrast'); } },
    ],
    Help: [
      { label: 'Keyboard Shortcuts', action: function() { state.showShortcuts = true; refreshUI(); } },
      { label: 'About', action: function() { alert('Infinite Painter Studio v1.0 - A professional digital painting application.'); } },
    ],
  };

  Object.keys(menus).forEach(function(menuName) {
    var wrapper = el('div', { className: 'menu-bar-item', style: { position: 'relative', display: 'inline-block' } });
    wrapper.textContent = menuName;
    wrapper.addEventListener('click', function(e) {
      e.stopPropagation();
      state.activeMenu = (state.activeMenu === menuName) ? null : menuName;
      buildMenuBar();
    });
    wrapper.addEventListener('mouseenter', function() {
      if (state.activeMenu && state.activeMenu !== menuName) {
        state.activeMenu = menuName;
        buildMenuBar();
      }
    });
    if (state.activeMenu === menuName) {
      wrapper.style.background = '#3a3a5a';
      wrapper.style.color = '#fff';
      var dropdown = el('div', { className: 'dropdown-menu' });
      menus[menuName].forEach(function(item) {
        if (item.separator) {
          dropdown.appendChild(el('div', { className: 'dropdown-separator' }));
        } else {
          var di = el('div', { className: 'dropdown-item', onClick: function(e) { e.stopPropagation(); item.action(); state.activeMenu = null; buildMenuBar(); } });
          di.appendChild(el('span', {}, item.label));
          if (item.shortcut) {
            var sc = el('span', { style: { color: '#888', marginLeft: '16px', fontSize: '10px' } }, item.shortcut);
            di.appendChild(sc);
          }
          dropdown.appendChild(di);
        }
      });
      wrapper.appendChild(dropdown);
    }
    menuBarEl.appendChild(wrapper);
  });
}

// ============ BUILD RIGHT PANEL ============
function buildRightPanel() {
  if (!rightPanelEl) return;
  rightPanelEl.innerHTML = '';

  // Tabs
  var tabBar = el('div', { style: { display: 'flex', borderBottom: '1px solid #333366', flexShrink: '0' } });
  ['brush','color','layers','history'].forEach(function(tab) {
    var tabBtn = el('div', {
      className: 'tab-btn' + (state.rightPanel === tab ? ' active' : ''),
      onClick: function() { state.rightPanel = tab; refreshUI(); }
    }, tab);
    tabBar.appendChild(tabBtn);
  });
  rightPanelEl.appendChild(tabBar);

  var content = el('div', { style: { flex: '1', overflowY: 'auto', padding: '8px' } });
  rightPanelEl.appendChild(content);

  if (state.rightPanel === 'brush') {
    buildBrushPanel(content);
  } else if (state.rightPanel === 'color') {
    buildColorPanel(content);
  } else if (state.rightPanel === 'layers') {
    buildLayersPanel(content);
  } else if (state.rightPanel === 'history') {
    buildHistoryPanel(content);
  }
}

function makeSlider(label, min, max, value, onChange) {
  var wrapper = el('div', { style: { marginBottom: '8px' } });
  var lbl = el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '2px' } }, label + ': ' + value);
  var input = el('input', { type: 'range', min: String(min), max: String(max), value: String(value), onInput: function(e) {
    var v = Number(e.target.value);
    onChange(v);
    lbl.textContent = label + ': ' + v;
  } });
  wrapper.appendChild(lbl);
  wrapper.appendChild(input);
  return wrapper;
}

function buildBrushPanel(container) {
  container.appendChild(makeSlider('Size', 1, 500, state.brushSize, function(v) { state.brushSize = v; }));
  container.appendChild(makeSlider('Opacity', 1, 100, state.brushOpacity, function(v) { state.brushOpacity = v; }));
  container.appendChild(makeSlider('Flow', 1, 100, state.brushFlow, function(v) { state.brushFlow = v; }));
  container.appendChild(makeSlider('Hardness', 0, 100, state.brushHardness, function(v) { state.brushHardness = v; }));
  container.appendChild(makeSlider('Spacing', 1, 50, state.brushSpacing, function(v) { state.brushSpacing = v; }));

  // Brush type selector
  var typeWrapper = el('div', { style: { marginBottom: '8px' } });
  typeWrapper.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '2px' } }, 'Brush Type'));
  var typeSelect = el('select', { value: state.brushType, style: { width: '100%' }, onChange: function(e) { state.brushType = e.target.value; } });
  ['round','pencil','ink','airbrush','watercolor','marker','charcoal'].forEach(function(t) {
    var opt = el('option', { value: t }, t.charAt(0).toUpperCase() + t.slice(1));
    if (t === state.brushType) opt.selected = true;
    typeSelect.appendChild(opt);
  });
  typeWrapper.appendChild(typeSelect);
  container.appendChild(typeWrapper);

  // Presets section
  var presetsDiv = el('div', { style: { borderTop: '1px solid #333366', paddingTop: '8px', marginTop: '8px' } });
  presetsDiv.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '4px' } }, 'Brush Presets'));
  var catSelect = el('select', { style: { width: '100%', marginBottom: '6px' }, onChange: function(e) { state.brushCategory = e.target.value; refreshUI(); } });
  Object.keys(BRUSH_CATEGORIES).forEach(function(cat) {
    var opt = el('option', { value: cat }, cat);
    if (cat === state.brushCategory) opt.selected = true;
    catSelect.appendChild(opt);
  });
  presetsDiv.appendChild(catSelect);

  var grid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '3px', maxHeight: '180px', overflowY: 'auto' } });
  var presets = BRUSH_CATEGORIES[state.brushCategory] || [];
  presets.forEach(function(preset) {
    var btn = el('button', {
      className: 'btn',
      title: preset.name,
      style: { fontSize: '9px', padding: '3px 2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' },
      onClick: function() { applyPreset(preset); }
    }, preset.name);
    grid.appendChild(btn);
  });
  presetsDiv.appendChild(grid);
  container.appendChild(presetsDiv);
}

function buildColorPanel(container) {
  // Hue slider
  var hueWrapper = el('div', { style: { marginBottom: '8px' } });
  hueWrapper.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '2px' } }, 'Hue: ' + state.hue));
  var hueInput = el('input', { type: 'range', min: '0', max: '360', value: String(state.hue), style: { background: 'linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00)' }, onInput: function(e) {
    state.hue = Number(e.target.value); updateColorFromHSV(); refreshUI();
  } });
  hueWrapper.appendChild(hueInput);
  container.appendChild(hueWrapper);

  // SV picker area
  var svArea = el('div', { style: { position: 'relative', width: '100%', height: '150px', borderRadius: '4px', overflow: 'hidden', cursor: 'crosshair', marginBottom: '8px', background: 'linear-gradient(to bottom, transparent, #000), linear-gradient(to right, #fff, hsl(' + state.hue + ',100%,50%))' } });
  var svMarker = el('div', { style: { position: 'absolute', width: '12px', height: '12px', border: '2px solid white', borderRadius: '50%', transform: 'translate(-50%, -50%)', pointerEvents: 'none', left: state.sat + '%', top: (100 - state.val) + '%' } });
  svArea.appendChild(svMarker);
  var svDragging = false;
  function svUpdate(e) {
    var rect = svArea.getBoundingClientRect();
    state.sat = clamp(Math.round(((e.clientX - rect.left) / rect.width) * 100), 0, 100);
    state.val = clamp(Math.round((1 - (e.clientY - rect.top) / rect.height) * 100), 0, 100);
    updateColorFromHSV();
    refreshUI();
  }
  svArea.addEventListener('mousedown', function(e) { svDragging = true; svUpdate(e); });
  document.addEventListener('mousemove', function(e) { if (svDragging) svUpdate(e); });
  document.addEventListener('mouseup', function() { svDragging = false; });
  container.appendChild(svArea);

  // Saturation/Value sliders
  container.appendChild(makeSlider('Saturation', 0, 100, state.sat, function(v) { state.sat = v; updateColorFromHSV(); refreshUI(); }));
  container.appendChild(makeSlider('Value', 0, 100, state.val, function(v) { state.val = v; updateColorFromHSV(); refreshUI(); }));

  // Color preview + hex input
  var colorRow = el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' } });
  colorRow.appendChild(el('div', { style: { width: '32px', height: '32px', borderRadius: '4px', border: '1px solid #444466', backgroundColor: state.foregroundColor } }));
  var hexInput = el('input', { type: 'text', value: state.foregroundColor, style: { flex: '1', background: '#2a2a4a', border: '1px solid #444466', borderRadius: '4px', padding: '4px 8px', color: '#ccc', fontSize: '11px', fontFamily: 'monospace' }, onChange: function(e) { setColorFromHex(e.target.value); } });
  colorRow.appendChild(hexInput);
  container.appendChild(colorRow);

  // RGB sliders
  var rgb = hexToRgb(state.foregroundColor);
  var rgbDiv = el('div', { style: { marginBottom: '8px' } });
  rgbDiv.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '4px' } }, 'RGB'));
  ['r','g','b'].forEach(function(ch) {
    var row = el('div', { style: { display: 'flex', alignItems: 'center', gap: '4px', marginBottom: '3px' } });
    row.appendChild(el('span', { style: { fontSize: '9px', color: '#666', width: '10px', textTransform: 'uppercase' } }, ch));
    var input = el('input', { type: 'range', min: '0', max: '255', value: String(rgb[ch]), style: { flex: '1' }, onInput: function(e) {
      var c = hexToRgb(state.foregroundColor);
      c[ch] = Number(e.target.value);
      state.foregroundColor = rgbToHex(c.r, c.g, c.b);
      var hsv = rgbToHsv(c.r, c.g, c.b);
      state.hue = hsv.h; state.sat = hsv.s; state.val = hsv.v;
      refreshUI();
    } });
    row.appendChild(input);
    row.appendChild(el('span', { style: { fontSize: '9px', color: '#999', width: '24px', textAlign: 'right' } }, String(rgb[ch])));
    rgbDiv.appendChild(row);
  });
  container.appendChild(rgbDiv);

  // Recent colors
  var recentDiv = el('div', {});
  recentDiv.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '4px' } }, 'Recent Colors'));
  var recentGrid = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: '3px' } });
  state.recentColors.forEach(function(c) {
    var swatch = el('div', { className: 'color-swatch', style: { backgroundColor: c }, onClick: function() { setColorFromHex(c); } });
    recentGrid.appendChild(swatch);
  });
  recentDiv.appendChild(recentGrid);
  container.appendChild(recentDiv);
}

function buildLayersPanel(container) {
  // Layer action buttons
  var btnRow = el('div', { style: { display: 'flex', gap: '4px', marginBottom: '8px', flexWrap: 'wrap' } });
  [
    { label: '+New', action: addLayer },
    { label: 'Dup', action: duplicateLayer },
    { label: 'Del', action: deleteLayer },
    { label: 'Merge', action: mergeDown },
    { label: 'Flat', action: flattenImage },
  ].forEach(function(b) {
    btnRow.appendChild(el('button', { className: 'btn', style: { fontSize: '10px', padding: '3px 6px' }, onClick: b.action }, b.label));
  });
  container.appendChild(btnRow);

  // Layer list (reversed for visual order)
  var layerList = el('div', { style: { marginBottom: '8px' } });
  var reversed = state.layers.slice().reverse();
  reversed.forEach(function(layer, ri) {
    var idx = state.layers.length - 1 - ri;
    var item = el('div', { className: 'layer-item' + (layer.id === state.activeLayerId ? ' active' : ''), onClick: function() { state.activeLayerId = layer.id; refreshUI(); } });

    // Visibility toggle
    var visBtn = el('button', { style: { fontSize: '10px', width: '18px', height: '18px', background: 'none', border: 'none', color: '#bbb', cursor: 'pointer' }, onClick: function(e) {
      e.stopPropagation(); layer.visible = !layer.visible; compositeAll(); refreshUI();
    } }, layer.visible ? '\u{1F441}' : '\u25CB');
    item.appendChild(visBtn);

    // Lock toggle
    var lockBtn = el('button', { style: { fontSize: '10px', width: '18px', height: '18px', background: 'none', border: 'none', color: '#bbb', cursor: 'pointer' }, onClick: function(e) {
      e.stopPropagation(); layer.locked = !layer.locked; refreshUI();
    } }, layer.locked ? '\u{1F512}' : '\u25CB');
    item.appendChild(lockBtn);

    // Name
    item.appendChild(el('span', { style: { flex: '1', fontSize: '10px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, layer.name));

    // Reorder buttons
    var upBtn = el('button', { style: { fontSize: '10px', background: 'none', border: 'none', color: '#bbb', cursor: 'pointer', padding: '0 2px' }, onClick: function(e) { e.stopPropagation(); moveLayerOrder(idx, 1); } }, '\u2191');
    var downBtn = el('button', { style: { fontSize: '10px', background: 'none', border: 'none', color: '#bbb', cursor: 'pointer', padding: '0 2px' }, onClick: function(e) { e.stopPropagation(); moveLayerOrder(idx, -1); } }, '\u2193');
    item.appendChild(upBtn);
    item.appendChild(downBtn);
    layerList.appendChild(item);
  });
  container.appendChild(layerList);

  // Active layer properties
  var activeLayer = getActiveLayer();
  if (activeLayer) {
    var propsDiv = el('div', { style: { borderTop: '1px solid #333366', paddingTop: '8px' } });
    propsDiv.appendChild(makeSlider('Layer Opacity', 0, 100, activeLayer.opacity, function(v) { activeLayer.opacity = v; compositeAll(); }));

    var blendWrapper = el('div', { style: { marginBottom: '8px' } });
    blendWrapper.appendChild(el('label', { style: { fontSize: '10px', color: '#999', display: 'block', marginBottom: '2px' } }, 'Blend Mode'));
    var blendSelect = el('select', { style: { width: '100%' }, onChange: function(e) { activeLayer.blendMode = e.target.value; compositeAll(); } });
    BLEND_MODES.forEach(function(m) {
      var opt = el('option', { value: m }, m);
      if (m === activeLayer.blendMode) opt.selected = true;
      blendSelect.appendChild(opt);
    });
    blendWrapper.appendChild(blendSelect);
    propsDiv.appendChild(blendWrapper);
    container.appendChild(propsDiv);
  }
}

function buildHistoryPanel(container) {
  var list = el('div', { style: { maxHeight: '400px', overflowY: 'auto' } });
  state.historyLabels.forEach(function(label, i) {
    var item = el('div', {
      style: { padding: '4px 8px', borderRadius: '3px', cursor: 'pointer', fontSize: '10px', background: i === state.historyIndex ? '#4455cc' : 'transparent', color: i === state.historyIndex ? '#fff' : '#bbb', marginBottom: '2px' },
      onClick: function() { state.historyIndex = i; restoreFromHistory(i); }
    }, (i + 1) + '. ' + label);
    list.appendChild(item);
  });
  container.appendChild(list);
}

// ============ DIALOGS ============
function buildDialogs() {
  if (!dialogContainerEl) return;
  dialogContainerEl.innerHTML = '';

  if (state.showNewDialog) {
    dialogContainerEl.style.display = 'flex';
    dialogContainerEl.style.alignItems = 'center';
    dialogContainerEl.style.justifyContent = 'center';
    dialogContainerEl.style.background = 'rgba(0,0,0,0.6)';
    var dialog = el('div', { className: 'panel', style: { padding: '24px', width: '340px' } });
    dialog.appendChild(el('h3', { style: { fontSize: '14px', fontWeight: 'bold', color: '#fff', marginBottom: '16px' } }, 'New Canvas'));
    var grid = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' } });
    [
      [1920, 1080, 'HD'],
      [2560, 1440, 'QHD'],
      [3840, 2160, '4K'],
      [4096, 4096, 'Square 4K'],
      [1080, 1080, 'Square'],
      [1080, 1920, 'Portrait'],
    ].forEach(function(item) {
      var btn = el('button', { className: 'btn', style: { padding: '8px', fontSize: '10px' }, onClick: function() { newCanvas(item[0], item[1]); } }, item[2] + ' (' + item[0] + 'x' + item[1] + ')');
      grid.appendChild(btn);
    });
    dialog.appendChild(grid);
    var closeBtn = el('button', { className: 'btn', style: { marginTop: '12px', width: '100%', padding: '8px' }, onClick: closeDialogs }, 'Cancel');
    dialog.appendChild(closeBtn);
    dialogContainerEl.appendChild(dialog);
    dialogContainerEl.addEventListener('click', function(e) { if (e.target === dialogContainerEl) closeDialogs(); });
  } else if (state.showShortcuts) {
    dialogContainerEl.style.display = 'flex';
    dialogContainerEl.style.alignItems = 'flex-start';
    dialogContainerEl.style.justifyContent = 'center';
    dialogContainerEl.style.paddingTop = '80px';
    dialogContainerEl.style.background = 'rgba(0,0,0,0.6)';
    var dialog = el('div', { className: 'panel', style: { padding: '24px', width: '400px', maxHeight: '500px', overflowY: 'auto' } });
    dialog.appendChild(el('h3', { style: { fontSize: '14px', fontWeight: 'bold', color: '#fff', marginBottom: '12px' } }, 'Keyboard Shortcuts'));
    var shortcuts = [
      ['B','Brush'], ['N','Pencil'], ['E','Eraser'], ['V','Move'], ['G','Bucket Fill'], ['I','Eyedropper'],
      ['X','Swap Colors'], ['D','Default Colors'],
      ['[ / ]','Decrease/Increase Brush Size'], ['+ / -','Zoom In/Out'], ['0','Reset View'],
      ['Space+Drag','Pan Canvas'], ['Scroll','Zoom'], ['Ctrl+Scroll','Rotate Canvas'],
      ['Ctrl+Z','Undo'], ['Ctrl+Shift+Z','Redo'], ['Ctrl+N','New Canvas'], ['Ctrl+S','Export PNG'],
    ];
    shortcuts.forEach(function(s) {
      var row = el('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '3px 0', borderBottom: '1px solid #2a2a4a' } });
      row.appendChild(el('span', { style: { color: '#ccc' } }, s[1]));
      row.appendChild(el('span', { style: { color: '#6677ff', fontFamily: 'monospace', fontSize: '11px' } }, s[0]));
      dialog.appendChild(row);
    });
    var closeBtn = el('button', { className: 'btn', style: { marginTop: '12px', width: '100%', padding: '8px' }, onClick: closeDialogs }, 'Close');
    dialog.appendChild(closeBtn);
    dialogContainerEl.appendChild(dialog);
    dialogContainerEl.addEventListener('click', function(e) { if (e.target === dialogContainerEl) closeDialogs(); });
  } else {
    dialogContainerEl.style.display = 'none';
  }
}

// ============ START ============
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
